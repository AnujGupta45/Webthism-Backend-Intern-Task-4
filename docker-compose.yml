version: '3.8'

services:
  api:
    build: .
    container_name: restaurant-booking-api
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_booking
      - JWT_SECRET=dockersupersecretkeychangeinprod
      - JWT_EXPIRE=30d
      - NODE_ENV=production
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/usr/src/app/uploads

  mongodb:
    image: mongo:6.0
    container_name: restaurant-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
